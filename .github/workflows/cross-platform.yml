# Cross-platform smoke matrix (G3).
#
# Boots the daemon on Linux + macOS runners so we catch
# SQLite native-binding drift before it ships. Linux runners
# ship `libsqlite3` so the SQLite probes should PASS; macOS
# runners often lack the prebuilt binding, in which case the
# probe SKIPs. Either outcome keeps the matrix cell green —
# only a true failure (e.g. a code bug, a port conflict) flips
# the job to red.
#
# Triggers on push to master, every PR, and manual dispatch.
# We deliberately keep this separate from `test.yml` so a
# slow cross-platform job doesn't bottleneck the regular
# Node-version matrix.

name: cross-platform

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # Linux is the primary target — sqlite binary is prebuilt.
        # macOS regularly fails to build better-sqlite3 from source
        # on first run, so we treat the SQLite probe as optional
        # there. The script itself is the gatekeeper; the matrix
        # just gives us two real-world environments.
        os: [ubuntu-latest, macos-latest]
        node: ['20']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts

      - name: Install better-sqlite3 prebuilt
        # The prebuilt binary keeps the matrix under 30s; on macOS
        # the source build can take 5+ minutes via node-gyp. If
        # the prebuild is missing, the smoke script falls back to
        # a SKIP rather than failing the job.
        run: npm install --no-save --foreground-scripts better-sqlite3@11.5.0 || true

      - name: Doctor (env + binaries)
        run: npm run doctor

      - name: Cross-platform smoke
        run: node --import tsx scripts/smoke-cross-platform.mjs

      - name: Daemon smoke
        run: npm run smoke:serve