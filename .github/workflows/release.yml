# Release on tag workflow.
#
# When a maintainer pushes a tag like `v0.2.0`, this workflow:
#   1. Runs the full test matrix on Node 18 / 20 / 22 to confirm the
#      tag points at a green commit.
#   2. Bumps the `version` field in every workspace package.json
#      (root + packages/*) to match the tag.
#   3. Builds the web dashboard and uploads it as a workflow
#      artifact so it can be attached to a GitHub Release.
#   4. Creates a GitHub Release with auto-generated notes from the
#      commits between the previous tag and HEAD.
#
# The bump step is the only thing that mutates the tree on master;
# the resulting commit is added to the tag via a follow-up push by
# the maintainer (the workflow itself doesn't push back to master
# to avoid permission escalations on the default branch).

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test on Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts

      - name: Doctor
        run: npm run doctor

      - name: Test suite
        run: npm test

      - name: Coverage gate
        run: npm run coverage

      - name: Verify README
        run: npm run verify:readme

  release:
    name: Bump + publish release
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only auto-publish for tag pushes; manual dispatch lets a
    # maintainer dry-run the bump without pushing a tag.
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts

      - name: Bump package.json versions
        run: node scripts/bump-version.mjs "${{ steps.version.outputs.version }}"

      - name: Build web dashboard
        run: npm run build --workspace=@rdma/web

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdma-web-${{ steps.version.outputs.version }}
          path: packages/rdma-web/dist
          retention-days: 30

      - name: Generate release notes
        id: notes
        run: |
          # Use the previous tag as the comparison base; if there is
          # none, just take the most recent 50 commits.
          PREV=$(git tag --sort=-v:refname | grep -v "^$GITHUB_REF_NAME$" | head -n 1)
          if [ -z "$PREV" ]; then
            PREV=$(git rev-list --max-parents=0 HEAD | head -n 1)
          fi
          NOTES=$(node scripts/format-release-notes.mjs "$PREV" HEAD)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'v${{ steps.version.outputs.version }}'
          generate_release_notes: false
          body: ${{ steps.notes.outputs.notes }}
          files: |
            packages/rdma-web/dist/index.html
            packages/rdma-web/dist/assets/*