name: Tests

# Run on every push to master, every PR, and on demand. Concurrency
# cancels in-progress runs when a new commit lands on the same ref
# so we don't burn CI minutes on stale pushes.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        # Pin to LTS lines so we don't burn CI on every odd-numbered
        # Node release. The 18 line guards against breaking our
        # minimum supported version; 20 is the project default; 22
        # is the most recent LTS we actively test against.
        node: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        # We pass --include=dev because the project ships devDeps
        # in nested node_modules trees that a plain `npm install`
        # would silently skip. See scripts/doctor.mjs.
        run: npm install --include=dev --ignore-scripts

      - name: Doctor (env + binaries)
        run: npm run doctor

      - name: Test suite
        run: npm test

      - name: Source coverage gate (>=95%)
        run: npm run coverage

      - name: README command smoke
        # verify:readme walks every bash code block in the two
        # READMEs and spawns each command. Long-running daemons are
        # matched on a readiness line and killed.
        run: npm run verify:readme

      - name: Daemon end-to-end
        run: npm run smoke:serve
